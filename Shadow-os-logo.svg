<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">

<!-- transparent background -->
<rect width="100%" height="100%" fill="transparent"></rect>

<!-- orbit ring -->
<circle cx="210" cy="190" r="90" fill="none" stroke="#00ff88" stroke-width="3" opacity="0.4"></circle>

<!-- center core -->
<circle cx="210" cy="190" r="14" fill="#00ff88"></circle>

<!-- orbiting nodes -->
<g>

<circle cx="210" cy="100" r="6" fill="#00ff88"></circle>
<circle cx="210" cy="100" r="6" fill="#00ff88" transform="rotate(120 210 190)"></circle>
<circle cx="210" cy="100" r="6" fill="#00ff88" transform="rotate(240 210 190)"></circle>

<!-- rotation animation -->
<animateTransform attributeName="transform" type="rotate" from="0 210 190" to="360 210 190" dur="6s" repeatCount="indefinite"></animateTransform>

</g>

<!-- title -->
<text x="210" y="340" font-family="Verdana, Geneva, sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle" letter-spacing="5">
SHADOW OS
</text>

<!-- subtitle -->
<text x="210" y="365" font-family="Verdana, Geneva, sans-serif" font-size="8" font-weight="500" fill="#00ff88" text-anchor="middle" letter-spacing="3">
LIGHT • FAST • SECURE
</text>

</svg>